# Install this file on the VPS host, not inside Docker:
#   /etc/nginx/sites-available/water-supply-crm.conf
#
# Replace the domains if you are not deploying on `*.testinglinq.com`.
# This is intentionally HTTP-first so Certbot can attach TLS listeners later.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name backend.testinglinq.com;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location /api/tracking/subscribe {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.testinglinq.com;

    location / {
        proxy_pass http://127.0.0.1:4300;
        proxy_http_version 1.1;
