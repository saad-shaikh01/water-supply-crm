version: '3.9'

networks:
  water-net:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watercrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-water_supply_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - water-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watercrm} -d ${POSTGRES_DB:-water_supply_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    networks:
      - water-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbitp}
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - water-net
    restart: unless-stopped

  api-backend:
    build:
      context: .
      dockerfile: apps/api-backend/Dockerfile
      target: production
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - water-net
    restart: on-failure
    ports:
      - "3000:3000"

  vendor-dashboard:
    build:
      context: apps/vendor-dashboard
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    env_file:
      - .env
    depends_on:
      - api-backend
    networks:
      - water-net
    restart: on-failure
    ports:
      - "4201:4201"

  customer-portal:
    build:
      context: apps/customer-portal
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    env_file:
      - .env
    depends_on:
      - api-backend
    networks:
      - water-net
    restart: on-failure
    ports:
      - "4202:4202"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
