# ─── Networks ──────────────────────────────────────────────────────────────────
# wscrm_internal — isolated, no external egress.  Only data-layer services live
#   here, plus api-backend which needs to reach them.
# wscrm_proxy — shared app network for any reverse-proxy container.
#   In the default VPS setup, app services also publish loopback-only host ports
#   so host Nginx can proxy to 127.0.0.1 safely.
networks:
  wscrm_internal:
    driver: bridge
    internal: true
  wscrm_proxy:
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  uploads_data:
  whatsapp_session:   # Persists WhatsApp auth across container restarts — mount into api-backend

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: wscrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wscrm_internal
    # No ports exposed — internal only

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wscrm-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - wscrm_internal
    # No ports exposed — internal only

  # ── API Backend ───────────────────────────────────────────────────────────────
  api-backend:
    build:
      context: .
      dockerfile: apps/api-backend/Dockerfile
    container_name: wscrm-api
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false   # must exist in production; optional for local config checks
    environment:
      NODE_ENV: production
      PORT: "3100"
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      REDIS_URL: "redis://redis:6379"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      # WhatsApp — set WHATSAPP_ENABLED=true in .env.prod to activate.
      # Scan the QR code printed in container logs on first start.
      WHATSAPP_SESSION_PATH: /app/whatsapp-session
      CHROMIUM_PATH: /usr/bin/chromium-browser
    volumes:
      - uploads_data:/app/uploads
      - whatsapp_session:/app/whatsapp-session
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/api/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    ports:
      - "127.0.0.1:3100:3100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wscrm_internal
      - wscrm_proxy

  # ── Admin Panel ──────────────────────────────────────────────────────────────
  admin-panel:
    build:
      context: .
      dockerfile: apps/admin-panel/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: wscrm-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4300"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4300/auth/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:4300:4300"
    depends_on:
      api-backend:
        condition: service_healthy
    networks:
      - wscrm_proxy

  # ── Vendor Dashboard ──────────────────────────────────────────────────────────
  vendor-dashboard:
    build:
      context: .
      dockerfile: apps/vendor-dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_MESSAGING_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_MESSAGING_VAPID_KEY}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_VAPID_KEY}
    container_name: wscrm-vendor
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4301"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4301/auth/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:4301:4301"
    depends_on:
      api-backend:
        condition: service_healthy
    networks:
      - wscrm_proxy

  # ── Customer Portal ───────────────────────────────────────────────────────────
  customer-portal:
    build:
      context: .
      dockerfile: apps/customer-portal/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_MESSAGING_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_MESSAGING_VAPID_KEY}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_VAPID_KEY}
    container_name: wscrm-portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4302"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4302/auth/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:4302:4302"
    depends_on:
      api-backend:
        condition: service_healthy
    networks:
      - wscrm_proxy
